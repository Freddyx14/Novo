<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña - Novo</title>
    {% include 'base_styles.html' %}
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #eef2ff 50%, #ecfdf5 100%);
            min-height: 100vh;
        }
        .glass-card {
            backdrop-filter: blur(18px);
            background: rgba(255, 255, 255, 0.82);
        }
    </style>
</head>
<body class="flex items-center justify-center p-6 relative overflow-hidden">
    <div class="absolute inset-0 pointer-events-none">
        <div class="absolute -top-24 -right-24 w-80 h-80 bg-indigo-200/40 rounded-full blur-3xl"></div>
        <div class="absolute -bottom-24 -left-24 w-80 h-80 bg-emerald-200/40 rounded-full blur-3xl"></div>
    </div>

    <div class="glass-card w-full max-w-md rounded-3xl shadow-2xl border border-white/70 p-8 md:p-10 relative z-10">
        <div class="text-center mb-8">
            <img src="{{ url_for('static', filename='images/logo-novo.svg') }}" alt="Novo" class="w-14 h-14 mx-auto mb-4">
            <h1 class="text-3xl font-extrabold text-novo-text">Recuperar contraseña</h1>
            <p class="text-novo-text-light mt-2">Te enviaremos un enlace para crear una nueva contraseña.</p>
        </div>

        {% if error %}
        <div class="mb-5 rounded-2xl border border-red-200 bg-red-50 px-4 py-3 text-red-700 text-sm font-medium">
            {{ error }}
        </div>
        {% endif %}

        {% if success %}
        <div class="mb-5 rounded-2xl border border-emerald-200 bg-emerald-50 px-4 py-3 text-emerald-700 text-sm font-medium">
            {{ success }}
        </div>
        {% endif %}

        <form method="POST" action="{{ url_for('forgot_password') }}" class="space-y-5">
            <div>
                <label for="email" class="block text-sm font-semibold text-novo-text mb-2">Correo electrónico</label>
                <input type="email" id="email" name="email" placeholder="tu@email.com" required
                       class="w-full rounded-2xl border-2 border-slate-200 bg-white px-4 py-3 text-novo-text placeholder:text-slate-400 focus:border-indigo-500 focus:outline-none focus:ring-4 focus:ring-indigo-100">
            </div>

            <button type="submit" class="w-full rounded-2xl bg-gradient-to-r from-novo-primary to-indigo-600 px-4 py-3.5 font-semibold text-white shadow-lg shadow-indigo-200 transition-transform hover:-translate-y-0.5">
                Enviarme enlace
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="{{ url_for('login') }}" class="text-sm font-semibold text-novo-primary hover:text-indigo-700">
                Volver al login
            </a>
        </div>
    </div>
</body>
</html>
